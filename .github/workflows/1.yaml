name: Entrega continua
on: [pull_request,push]
 
jobs:
    entrega-Ci:
        runs-on: ubuntu-latest
        steps:
            - name: verifica codigo
              uses: actions/checkout@v3
            - name: Using dotnet
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '10.x'
            - name: run build 
              run: dotnet build 
            - name: test
              run: dotnet test --no-build
